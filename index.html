<body>

    <div id="loading-screen">
        <div class="bunny-loader">🐰</div>
        <div class="loading-bar-container">
            <div id="loading-bar-fill" class="loading-bar-fill"></div>
        </div>
        <div class="loading-text" id="loading-text">กำลังเรียกน้องกระต่าย...</div>
    </div>

    <div id="main-content">
        <div class="main-card">
            <div class="scale-area">
                <div id="bunny-face" class="bunny-face-center">🐰</div>
                <div class="balance-beam" id="beam">
                    <div class="pan-container left-pan-pos" id="wrapL">
                        <div class="pan-cloud" id="panL">0</div>
                    </div>
                    <div class="pan-container right-pan-pos" id="wrapR">
                        <div class="pan-cloud" id="panR">0</div>
                    </div>
                </div>
                
                 <div class="display-box">
                    <div class="input-group">
                        <div id="displayL" class="screen active" onclick="setActive('L')">?</div>
                        <!--<div style="font-size: 2.3rem">🥕</div> -->
                        <div style="font-size: 2.3rem;font-weight: bold;height: 50px;width: 10px;"">=</div>
                        <div id="displayR" class="screen" onclick="setActive('R')">?</div>
                    </div>
                    <div id="status-text" style="margin-top:15px">พร้อมแล้วจ้า! พิมพ์เลขเลย</div>
                    <div id="x-value-display" style="margin-top: 10px; font-weight: bold; color: #ff85a2; min-height: 1.5em;"></div>
                </div>
            </div> 

            <div class="numpad-container">
                <div class="grid">
                    <button class="btn btn-op" onclick="press('+')">+</button>
                    <button class="btn btn-op" onclick="press('-')">−</button>
                    <button class="btn btn-op" onclick="press('*')">×</button>
                    <button class="btn btn-op" onclick="press('/')">÷</button>
                    <button class="btn" onclick="press('1')">1</button>
                    <button class="btn" onclick="press('2')">2</button>
                    <button class="btn" onclick="press('3')">3</button>
                    <button class="btn" onclick="press('4')">4</button>
                    <button class="btn" onclick="press('5')">5</button>
                    <button class="btn" onclick="press('6')">6</button>
                    <button class="btn" onclick="press('7')">7</button>
                    <button class="btn" onclick="press('8')">8</button>
                    <button class="btn btn-x" onclick="fullReset()">↺</button>
                    <button class="btn" onclick="press('9')">9</button>
                    <button class="btn" onclick="press('0')">0</button>
                    <button class="btn btn-del" onclick="press('DEL')">🥕</button>
                    <button class="btn btn-replace" onclick="handleReplace()">🐰 แทนค่า x และเริ่มชั่ง! 🐰</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Loading Logic ---
        window.addEventListener('load', () => {
            const bar = document.getElementById('loading-bar-fill');
            const text = document.getElementById('loading-text');
            const loadingScreen = document.getElementById('loading-screen');
            const mainContent = document.getElementById('main-content');
            
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 20;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    text.innerText = "มาแล้วจ้าาา!";
                    
                    // Hide loading and show main
                    setTimeout(() => {
                        loadingScreen.style.opacity = '0';
                        loadingScreen.style.visibility = 'hidden';
                        mainContent.style.display = 'flex';
                        setTimeout(() => mainContent.style.opacity = '1', 50);
                    }, 500);
                }
                bar.style.width = progress + '%';
                if (progress > 40) text.innerText = "กำลังเตรียมแครอท...";
                if (progress > 80) text.innerText = "น้องกระต่ายพร้อมแล้ว!";
            }, 200);
        });

        // --- 2. Scale Logic ---
        let activeSide = 'L';
        let dataL = "";
        let dataR = "";

        function setActive(side) {
            activeSide = side;
            document.getElementById('displayL').classList.toggle('active', side === 'L');
            document.getElementById('displayR').classList.toggle('active', side === 'R');
        }

        function press(val) {
            if (val === 'DEL') {
                if (activeSide === 'L') dataL = dataL.slice(0, -1);
                else dataR = dataR.slice(0, -1);
            } else {
                if (activeSide === 'L') dataL += val;
                else dataR += val;
            }
            resetScale();
            updateScreens();
        }

        function resetScale() {
            document.getElementById('beam').style.transform = `rotate(0deg)`;
            document.getElementById('wrapL').style.transform = `rotate(0deg)`;
            document.getElementById('wrapR').style.transform = `rotate(0deg)`;
            document.getElementById('bunny-face').innerText = "🐰";
        }

        function updateScreens() {
            document.getElementById('displayL').innerText = dataL || "?";
            document.getElementById('displayR').innerText = dataR || "?";
        }

        function handleReplace() {
    if (!dataL && !dataR) return;
    let val = prompt("🥕 ใส่ตัวเลขแครอทที่จะแทน x จ้า:");
    if (val !== null && val !== "" && !isNaN(val)) {
        // แสดงสถานะว่า x ถูกแทนด้วยเลขอะไร
        document.getElementById('x-value-display').innerText = `ตอนนี้แทน x ด้วยเลข ${val} อยู่จ้า ✨`;

        const processX = (str, value) => {
            return str
                .replace(/(\d)x/g, `$1*${value}`) 
                .replace(/x(\d)/g, `${value}*$1`) 
                .replace(/x/g, value);            
        };
        
        calculateAndTilt(processX(dataL, val), processX(dataR, val));
    }
}

// เพิ่มเติม: ปรับให้ล้างสถานะเมื่อมีการกดปุ่มเลขใหม่
function press(val) {
    if (val === 'DEL') {
        if (activeSide === 'L') dataL = dataL.slice(0, -1);
        else dataR = dataR.slice(0, -1);
    } else {
        if (activeSide === 'L') dataL += val;
        else dataR += val;
    }
    // ล้างข้อความแทนค่า x เมื่อเริ่มแก้ไขสมการใหม่
    document.getElementById('x-value-display').innerText = ""; 
    updateScreens();
    resetScale();
}

        function calculateAndTilt(exprL, exprR) {
            try {
                let resL = exprL ? eval(exprL.replace(/[+\-*/]$/, "")) : 0;
                let resR = exprR ? eval(exprR.replace(/[+\-*/]$/, "")) : 0;
                document.getElementById('panL').innerText = Number.isInteger(resL) ? resL : resL.toFixed(1);
                document.getElementById('panR').innerText = Number.isInteger(resR) ? resR : resR.toFixed(1);
                
                let angle = 0;
                if (resL > resR) { angle = -20; document.getElementById('bunny-face').innerText = "🐰💕"; }
                else if (resR > resL) { angle = 20; document.getElementById('bunny-face').innerText = "🐰💕"; }
                else { angle = 0; document.getElementById('bunny-face').innerText = "🐰✨"; }

                document.getElementById('beam').style.transform = `rotate(${angle}deg)`;
                document.getElementById('wrapL').style.transform = `rotate(${-angle}deg)`;
                document.getElementById('wrapR').style.transform = `rotate(${-angle}deg)`;
            } catch(e) {
                alert("อุ๊ย! สมการแปลกๆ เช็กอีกทีน้า");
                resetScale();
            }
            
        }

        function fullReset() {
    // 1. ล้างค่าตัวแปรสมการ
    dataL = "";
    dataR = "";
    activeSide = 'L';
    
    // 2. ล้างหน้าจอช่องใส่เลข (?) ให้กลับเป็นค่าว่าง
    updateScreens();
    
    // 3. เพิ่มส่วนนี้: ล้างตัวเลขที่ค้างบนก้อนเมฆตราชั่งให้เป็น 0
    document.getElementById('panL').innerText = "0";
    document.getElementById('panR').innerText = "0";
    
    // 4. ล้างสถานะ x และคืนค่าตราชั่งให้ตรง (Reset Scale)
    document.getElementById('x-value-display').innerText = "";
    resetScale(); 
    
    // 5. จัดการสถานะการเลือกช่อง (Active)
    document.getElementById('displayL').classList.add('active');
    document.getElementById('displayR').classList.remove('active');
    
    // 6. อัปเดตข้อความบอกสถานะ
    document.getElementById('status-text').innerText = "ล้างค่าเรียบร้อยแล้วจ้า! ✨";
}
    </script>
</body>
